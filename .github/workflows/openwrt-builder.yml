#
# Build OpenWrt for ZN M2 (IPQ60XX) NoWiFi
# Based on P3TERX/Actions-OpenWrt
#

name: Build OpenWrt

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/LiBwrt/LibWrt.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h

    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz \
          mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils \
          rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        echo "COMMIT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

    - name: Load custom feeds
      run: |
        [ -e $GITHUB_WORKSPACE/feeds.conf.default ] && mv $GITHUB_WORKSPACE/feeds.conf.default $OPENWRT_PATH/feeds.conf.default
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd $OPENWRT_PATH && ./scripts/feeds update -a

    - name: Install feeds
      run: cd $OPENWRT_PATH && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e $GITHUB_WORKSPACE/files ] && mv $GITHUB_WORKSPACE/files $OPENWRT_PATH/files
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE $OPENWRT_PATH/.config
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Generate config
      run: cd $OPENWRT_PATH && make defconfig

    - name: Cache OpenWrt build
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.OPENWRT_PATH }}/ccache
          ${{ env.OPENWRT_PATH }}/staging_dir
          ${{ env.OPENWRT_PATH }}/build_dir
        key: openwrt-${{ env.COMMIT_HASH }}
        restore-keys: openwrt-

    - name: Download packages
      run: cd $OPENWRT_PATH && make download -j$(nproc)

    - name: Compile firmware
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Upload firmware
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_ZN_M2_${{ env.DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      run: echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

    - name: Create release
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body: |
          ## OpenWrt 固件 - 兆能 M2 (NoWiFi)

          | 项目 | 内容 |
          |------|------|
          | 设备 | 兆能 M2 (IPQ60XX) |
          | 源码 | LiBwrt/LibWrt |
          | 分支 | main-nss |
          | 内核 | 6.12 |
          | NSS | v12.5 |
          | WiFi | 无 |
          | IP | 172.16.1.1 |
          | 密码 | 无 |
        files: ${{ env.FIRMWARE }}/*

    - name: Clean old releases
      if: env.UPLOAD_RELEASE == 'true'
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
